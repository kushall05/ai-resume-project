<!DOCTYPE html>
<html>
<head>
    <title>CareerAI — Premium Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div id="particles-js"></div>

<div class="dashboard">

    <aside class="sidebar">
        <h2>CareerAI</h2>
        <ul>
            <li class="active">📊 Dashboard</li>
            <li>🧠 Analysis</li>
            <li>📈 Insights</li>
        </ul>
    </aside>

    <main>
        <div class="card">

            <h1>AI Career Intelligence</h1>

            <form action="/analyze" method="post" enctype="multipart/form-data">
                <div class="upload-card" onclick="document.getElementById('fileInput').click();">
                    <p>Drag & Drop Resume</p>
                    <span>or click to upload</span>
                    <input type="file" id="fileInput" name="resume" required hidden>
                </div>

                <button class="btn-premium">Analyze Resume</button>
            </form>

        </div>
    </main>

</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
particlesJS("particles-js", {
  particles: {
    number:{value:60},
    color:{value:"#c4b5fd"},
    size:{value:3},
    line_linked:{enable:true,color:"#a5f3fc"}
  }
});
</script>

</body>
</html>
